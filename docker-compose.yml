services:
  api:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      ALLOWED_ORIGINS: http://localhost:3000
  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes: ["./frontend:/app"]
    ports: ["3000:3000"]
    environment:
      PATCHPILOT_API_URL: http://api:8000
    depends_on: [api]
